<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Classic 2 - Structure of Magic Trainer</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Assistant", "Heebo", "Noto Sans Hebrew", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 10% 10%, #dbeafe, #f8fafc 45%, #ecfeff);
      color: #0f172a;
      min-height: 100vh;
      padding: 12px;
    }
    #classic2-root {
      max-width: 1240px;
      margin: 0 auto;
    }
    .c2-page-nav {
      max-width: 1240px;
      margin: 0 auto 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    .c2-page-nav-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .c2-page-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid #bfdbfe;
      background: #ffffff;
      color: #1d4ed8;
      border-radius: 12px;
      padding: 9px 12px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.05);
    }
    .c2-page-btn:hover {
      background: #eff6ff;
      border-color: #93c5fd;
    }
    .c2-page-meta {
      color: #475569;
      font-size: 0.82rem;
      font-weight: 700;
    }
    .c2-loading-shell {
      max-width: 920px;
      margin: 16px auto;
      border: 1px solid #dbe7f5;
      background: rgba(255,255,255,0.9);
      border-radius: 18px;
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.07);
      padding: 18px;
    }
    .c2-loading-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin: 0 0 8px;
    }
    .c2-loading-text {
      margin: 0;
      color: #475569;
      line-height: 1.45;
    }
    .c2-loading-meta {
      margin-top: 8px;
      color: #1d4ed8;
      font-weight: 700;
      font-size: 0.86rem;
    }
    .c2-error {
      border-color: #fecaca;
      background: #fff1f2;
      color: #991b1b;
    }
  </style>
  <script>
    (function () {
      var root = window;
      var pageBuildMeta = { version: '', buildTime: '', buildIso: '', gitCommit: '' };

      function normalizeToken(v) {
        return String(v == null ? '' : v).trim();
      }

      function updateLoading(message, extra, isError) {
        var mount = document.getElementById('classic2-root');
        if (!mount) return;
        mount.innerHTML = [
          '<div class="c2-loading-shell' + (isError ? ' c2-error' : '') + '">',
          '<p class="c2-loading-title">' + (isError ? 'שגיאה בטעינת Classic 2' : 'טוען את Classic 2...') + '</p>',
          '<p class="c2-loading-text">' + (message || '') + '</p>',
          extra ? '<div class="c2-loading-meta">' + extra + '</div>' : '',
          '</div>'
        ].join('');
      }

      function currentUrl() {
        try { return new URL(window.location.href); } catch (e) { return null; }
      }

      function buildSignedUrl(versionValue, buildTimeValue) {
        var url = currentUrl();
        if (!url) return null;
        var version = normalizeToken(versionValue);
        var buildTime = normalizeToken(buildTimeValue);
        if (version) url.searchParams.set('v', version);
        if (buildTime) url.searchParams.set('t', buildTime);
        return url;
      }

      function maybeRefreshEmbeddedFrameFromManifest(manifest) {
        var isEmbedded = false;
        try { isEmbedded = window.self !== window.top; } catch (e) { isEmbedded = true; }
        if (!isEmbedded) return;
        var url = currentUrl();
        if (!url) return;

        var currentV = normalizeToken(url.searchParams.get('v'));
        var currentT = normalizeToken(url.searchParams.get('t'));
        var latestV = normalizeToken(manifest && manifest.version);
        var latestT = normalizeToken(manifest && manifest.buildTime);
        if (!latestV && !latestT) return;
        if (currentV === latestV && currentT === latestT) return;

        var target = buildSignedUrl(latestV, latestT);
        if (target && target.toString() !== window.location.href) {
          window.location.replace(target.toString());
        }
      }

      function withBuildQuery(path) {
        var raw = String(path || '');
        var version = normalizeToken(pageBuildMeta.version);
        var buildTime = normalizeToken(pageBuildMeta.buildTime);
        try {
          var u = new URL(raw, window.location.href);
          if (version) u.searchParams.set('v', version);
          if (buildTime) u.searchParams.set('t', buildTime);
          return u.toString();
        } catch (e) {
          var sep = raw.indexOf('?') === -1 ? '?' : '&';
          var qs = [];
          if (version) qs.push('v=' + encodeURIComponent(version));
          if (buildTime) qs.push('t=' + encodeURIComponent(buildTime));
          return raw + (qs.length ? sep + qs.join('&') : '');
        }
      }

      function fetchManifest() {
        var nonce = Date.now() + '-' + Math.random().toString(36).slice(2);
        return fetch('version.json?_classic2=' + encodeURIComponent(nonce), { cache: 'no-store' })
          .then(function (res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
          .then(function (manifest) {
            pageBuildMeta = {
              version: normalizeToken(manifest && manifest.version),
              buildTime: normalizeToken(manifest && manifest.buildTime),
              buildIso: normalizeToken(manifest && manifest.buildIso),
              gitCommit: normalizeToken(manifest && manifest.gitCommit)
            };
            root.__CLASSIC2_BUILD_META__ = pageBuildMeta;
            maybeRefreshEmbeddedFrameFromManifest(manifest);
            return manifest;
          })
          .catch(function () {
            return null;
          });
      }

      function loadBundle() {
        var extra = [];
        if (pageBuildMeta.version) extra.push('v' + pageBuildMeta.version);
        if (pageBuildMeta.gitCommit) extra.push(pageBuildMeta.gitCommit.slice(0, 7));
        if (pageBuildMeta.buildIso) extra.push(pageBuildMeta.buildIso);
        updateLoading(
          'מכין את סביבת האימון של Structure of Magic (Classic 2) עם טקסט, קטגוריות ומשוב חי.',
          extra.join(' ֲ· '),
          false
        );

        var homeLink = document.getElementById('c2-back-home');
        if (homeLink) {
          homeLink.setAttribute('href', withBuildQuery('index.html'));
        }
        var metaEl = document.getElementById('c2-page-meta');
        if (metaEl) {
          var bits = [];
          if (pageBuildMeta.version) bits.push('גרסה ' + pageBuildMeta.version);
          if (pageBuildMeta.gitCommit) bits.push('build ' + pageBuildMeta.gitCommit.slice(0, 7));
          metaEl.textContent = bits.join(' ֲ· ');
        }

        var script = document.createElement('script');
        script.src = withBuildQuery('js/classic2-trainer.bundle.js');
        script.defer = true;
        script.onerror = function () {
          updateLoading('לא ניתן לטעון את classic2-trainer.bundle.js', 'בדוק/י build או push אחרון', true);
          console.error('[Classic2] Failed to load bundle');
        };
        document.head.appendChild(script);
      }

      function start() {
        fetchManifest().finally(loadBundle);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start, { once: true });
      } else {
        start();
      }
    })();
  </script>
</head>
<body>
  <div class="c2-page-nav" aria-label="ניווט עמוד Classic 2">
    <div class="c2-page-nav-group">
      <a id="c2-back-home" class="c2-page-btn" href="index.html">חזרה לדף הראשי</a>
      <a class="c2-page-btn" href="classic_classic_trainer.html">Classic 1</a>
    </div>
    <div id="c2-page-meta" class="c2-page-meta" aria-live="polite"></div>
  </div>
  <div id="classic2-root">
    <div class="c2-loading-shell">
      <p class="c2-loading-title">טוען את Classic 2...</p>
      <p class="c2-loading-text">מכין את מנוע האימון.</p>
    </div>
  </div>
  <script src="js/trainer-shell-nav.js"></script>
</body>
</html>
