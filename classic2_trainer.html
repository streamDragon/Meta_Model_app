<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Classic 2 - Structure of Magic Trainer</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/css/feature-welcome.css">
  <script src="js/trainer-platform-contracts.js"></script>
  <script src="js/trainer-standalone.js"></script>
  <script>
    window.MetaTrainerStandalone.boot({
      "trainerId": "classic2",
      "manifestKey": "_classic2",
      "bundlePath": "js/classic2-trainer.bundle.js",
      "buildMetaGlobalKey": "__CLASSIC2_BUILD_META__"
});
  </script>
  <script>
    (function () {
      var FEATURE_ID = 'fw-classic2';
      var welcomeHTML = '<div class="fw-overlay" id="' + FEATURE_ID + '">' +
        '<span class="fw-badge">תרגול</span>' +
        '<h1 class="fw-title">קלאסיק 2 · מיון קלאסי</h1>' +
        '<p class="fw-hook">מיון קלאסי של כל שכבות הטקסט – המשפטים, הדפוסים, המסרים הסמויים.</p>' +
        '<div class="fw-cards">' +
          '<div class="fw-card">' +
            '<span class="fw-card__kicker">מה עושים</span>' +
            '<h3 class="fw-card__title">ממיינים משפטים</h3>' +
            '<p class="fw-card__body">לא רק לזהות – לפי מה? לאיזה קבוצה שייך המשפט ולמה?</p>' +
          '</div>' +
          '<div class="fw-card">' +
            '<span class="fw-card__kicker">מה מתחדד</span>' +
            '<h3 class="fw-card__title">קריאה בסיסית</h3>' +
            '<p class="fw-card__body">כשמוצגים לפניכם שלושה משפטים ברצף עם עניין על הסיווגים שלהם.</p>' +
          '</div>' +
        '</div>' +
        '<div class="fw-example">' +
          '<span class="fw-example__label">דוגמה קצרה</span>' +
          '<p class="fw-example__sentence">"תמיד ככה, אף פעם לא משתנה"</p>' +
          '<p class="fw-example__note">→ כלל גורף. מה משתנה? מתי?</p>' +
        '</div>' +
        '<button class="fw-cta" onclick="document.getElementById(\'' + FEATURE_ID + '\').style.display=\'none\';document.getElementById(\'trainerContent\').style.display=\'block\';">' +
          'פתחו את התרגיל ←' +
        '</button>' +
      '</div>';
      function injectWelcome() {
        if (document.getElementById(FEATURE_ID)) return;
        var wrapper = document.createElement('div');
        wrapper.id = 'trainerContent';
        wrapper.style.display = 'none';
        while (document.body.firstChild) {
          wrapper.appendChild(document.body.firstChild);
        }
        document.body.insertAdjacentHTML('afterbegin', welcomeHTML);
        document.body.appendChild(wrapper);
      }
      var obs = new MutationObserver(function (mutations) {
        for (var i = 0; i < mutations.length; i++) {
          if (mutations[i].addedNodes.length) {
            injectWelcome();
            break;
          }
        }
      });
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          obs.observe(document.body, { childList: true });
        });
      } else {
        obs.observe(document.body, { childList: true });
      }
    })();
  </script>
</head>
<body></body>
</html>
