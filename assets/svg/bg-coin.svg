<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="coinGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#f5d060"/>
      <stop offset="50%" stop-color="#e8b422"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
    <radialGradient id="innerGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#8b1a1a"/>
      <stop offset="100%" stop-color="#5c0e0e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- outer gold ring -->
  <circle cx="50" cy="50" r="48" fill="url(#coinGrad)"/>
  <!-- inner dark red -->
  <circle cx="50" cy="50" r="40" fill="url(#innerGrad)"/>
  <!-- shine -->
  <ellipse cx="36" cy="34" rx="8" ry="5" fill="rgba(255,255,255,0.2)" transform="rotate(-20,36,34)"/>
  <!-- B&G text -->
  <text x="50" y="46" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="#f5d060" text-anchor="middle" filter="url(#glow)">B&amp;G</text>
  <!-- subtitle -->
  <text x="50" y="60" font-family="Arial,sans-serif" font-size="6.5" fill="#f0c040" text-anchor="middle" letter-spacing="0.5">MENTORS</text>
  <!-- rim detail -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#d4a017" stroke-width="2" opacity="0.6"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="#f0c040" stroke-width="0.5" opacity="0.4"/>
</svg>
