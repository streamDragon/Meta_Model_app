<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Prism Lab - חפירה עמוקה עם עדשות</title>
  <script>
    (function () {
      var v = String(Date.now());
      function withV(path) {
        try {
          var u = new URL(path, location.href);
          u.searchParams.set('v', v);
          return u.toString();
        } catch (e) {
          return path + (path.indexOf('?') === -1 ? '?' : '&') + 'v=' + encodeURIComponent(v);
        }
      }
      function addCss(path) {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = withV(path);
        document.head.appendChild(link);
      }
      function addScript(path) {
        var s = document.createElement('script');
        s.src = withV(path);
        document.head.appendChild(s);
      }
      addCss('css/prism-lab.css');
      addScript('js/prism-lab.js');
    })();
  </script>
</head>
<body>
  <div id="prism-lab-app" aria-live="polite">
    <div style="max-width:980px;margin:36px auto;padding:16px;border:1px solid #dbeafe;border-radius:14px;background:#fff;">
      טוען Prism Lab...
    </div>
  </div>
  <script src="js/trainer-shell-nav.js"></script>
</body>
</html>
