<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>מעבדת רמות לוגיות - חלון נפרד</title>
  <link rel="icon" href="data:,">
  <script>
    (function () {
      var v = String(Date.now());
      function withV(path) {
        try {
          var u = new URL(path, location.href);
          u.searchParams.set('v', v);
          return u.toString();
        } catch (e) {
          return path + (path.indexOf('?') === -1 ? '?' : '&') + 'v=' + encodeURIComponent(v);
        }
      }
      function addScript(path) {
        var s = document.createElement('script');
        s.src = withV(path);
        document.head.appendChild(s);
      }
      window.__PRISM_LAB_ASSET_V__ = v;
      addScript('js/prism-necessity-map.js');
    })();
  </script>
</head>
<body>
  <div id="prism-lab-app" data-prism-necessity-app data-prism-necessity-mode="standalone" aria-live="polite">
    <div style="max-width:980px;margin:36px auto;padding:16px;border:1px solid #dbeafe;border-radius:14px;background:#fff;">
      טוענים את מעבדת רמות לוגיות...
    </div>
  </div>
  <script src="js/trainer-shell-nav.js"></script>
</body>
</html>
