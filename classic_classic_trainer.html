<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Classic Classic - Meta Model Trainer</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/css/feature-welcome.css">
  <script src="js/trainer-platform-contracts.js"></script>
  <script src="js/trainer-standalone.js"></script>
  <script>
    window.MetaTrainerStandalone.boot({
      "trainerId": "classic-classic",
      "manifestKey": "_classic_classic",
      "assetVersionGlobalKey": "__CC_ASSET_V__",
      "css": [
            "css/style.css",
            "css/classic-classic.css",
            "css/ui-enhancements.css",
            "css/meta-model-redesign.css"
      ],
      "scripts": [
            "js/classic-classic-config.js",
            "js/classic-classic-rng.js",
            "js/classic-classic-engine.js",
            "js/classic-classic-app.js"
      ]
});
  </script>
  <script>
    (function () {
      var FEATURE_ID = 'fw-classic1';
      var welcomeHTML = '<div class="fw-overlay" id="' + FEATURE_ID + '">' +
        '<span class="fw-badge">תרגול</span>' +
        '<h1 class="fw-title">קלאסיק 1 · זיהוי קלאסי</h1>' +
        '<p class="fw-hook">זיהוי קטגוריות של המטה-מודל – מחיקה, עיוות, הכללה – לפי הבנה ולא פי לחץ.</p>' +
        '<div class="fw-cards">' +
          '<div class="fw-card">' +
            '<span class="fw-card__kicker">מה עושים כאן</span>' +
            '<h3 class="fw-card__title">עוצרים על משפטים</h3>' +
            '<p class="fw-card__body">כל משפט מוצג כפי שנאמר. בוחרים את הקטגוריה, מסבירים את ההחלטה, ומדייקים את הצעקה.</p>' +
          '</div>' +
          '<div class="fw-card">' +
            '<span class="fw-card__kicker">מה מתקדמים</span>' +
            '<h3 class="fw-card__title">סוג ואחר סוג</h3>' +
            '<p class="fw-card__body">כל סוג לומד בנפרד. כשמתרגלים, מתחיל להיות קל יותר לזהות ולהגיב.</p>' +
          '</div>' +
        '</div>' +
        '<div class="fw-example">' +
          '<span class="fw-example__label">דוגמה קצרה</span>' +
          '<p class="fw-example__sentence">"אף אחד לא מבין אותי"</p>' +
          '<p class="fw-example__note">→ מה בדיוק? מתי התחיל? מי בדיוק \'אף אחד\'?</p>' +
        '</div>' +
        '<button class="fw-cta" onclick="document.getElementById(\'' + FEATURE_ID + '\').style.display=\'none\';document.getElementById(\'trainerContent\').style.display=\'block\';">' +
          'פתחו את התרגיל ←' +
        '</button>' +
      '</div>';
      function injectWelcome() {
        if (document.getElementById(FEATURE_ID)) return;
        var existing = document.body.firstChild;
        var wrapper = document.createElement('div');
        wrapper.id = 'trainerContent';
        wrapper.style.display = 'none';
        while (document.body.firstChild) {
          wrapper.appendChild(document.body.firstChild);
        }
        document.body.insertAdjacentHTML('afterbegin', welcomeHTML);
        document.body.appendChild(wrapper);
      }
      var obs = new MutationObserver(function (mutations) {
        for (var i = 0; i < mutations.length; i++) {
          if (mutations[i].addedNodes.length) {
            injectWelcome();
            break;
          }
        }
      });
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          obs.observe(document.body, { childList: true });
        });
      } else {
        obs.observe(document.body, { childList: true });
      }
    })();
  </script>
</head>
<body></body>
</html>
