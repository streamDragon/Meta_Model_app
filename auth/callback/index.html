<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Model - Authentication Callback</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f1f5f9;
            color: #0f172a;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        .auth-callback-card {
            width: min(520px, calc(100vw - 24px));
            border-radius: 14px;
            background: #ffffff;
            border: 1px solid #dbe7f5;
            box-shadow: 0 16px 34px rgba(2, 6, 23, 0.12);
            padding: 18px 16px;
            display: grid;
            gap: 10px;
        }

        .auth-callback-card h1 {
            margin: 0;
            font-size: 1.15rem;
        }

        .auth-callback-status {
            margin: 0;
            line-height: 1.45;
            color: #334155;
        }

        .auth-callback-status[data-tone="error"] {
            color: #991b1b;
        }

        .auth-callback-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .auth-callback-btn {
            border-radius: 9px;
            min-height: 38px;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            color: #0f172a;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .auth-callback-btn:hover {
            background: #e2e8f0;
        }

        .auth-callback-btn--icon {
            width: 38px;
            min-width: 38px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .auth-callback-btn--icon svg {
            width: 18px;
            height: 18px;
            display: block;
        }

        .auth-callback-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #1d4ed8;
            font-weight: 700;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <main class="auth-callback-card">
        <h1>מסיימים את ההתחברות...</h1>
        <p class="auth-callback-status" data-auth-callback-status data-tone="info">מאמתים התחברות מול Google...</p>
        <div class="auth-callback-actions">
            <button type="button" class="auth-callback-btn auth-callback-btn--icon" data-auth-callback-back aria-label="חזרה לעמוד הקודם" title="חזרה לעמוד הקודם">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"></path>
                </svg>
            </button>
            <button type="button" class="auth-callback-btn hidden" data-auth-callback-retry>Retry</button>
            <a class="auth-callback-link auth-callback-btn auth-callback-btn--icon" href="../../index.html" aria-label="מעבר לעמוד הבית" title="מעבר לעמוד הבית">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M4 10.5 12 4l8 6.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"></path>
                    <path d="M6.5 10v9h11v-9" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"></path>
                    <path d="M10 19v-5h4v5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"></path>
                </svg>
            </a>
        </div>
    </main>

    <script src="../../js/runtime-env.js"></script>
    <script>
        (function () {
            const backButton = document.querySelector('[data-auth-callback-back]');
            if (!backButton) return;
            backButton.addEventListener('click', function () {
                if (window.history.length > 1) {
                    window.history.back();
                    return;
                }
                window.location.assign('../../index.html');
            });
        })();
    </script>
    <script type="module" src="../../js/freemium/auth-callback-page.js"></script>
</body>
</html>
