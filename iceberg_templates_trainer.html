<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Iceberg Templates - קצה קרחון / שלדי עומק</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Assistant", "Heebo", "Noto Sans Hebrew", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 10% 8%, #fef3c7, #fffaf0 35%, #f8fafc);
      color: #111827;
      min-height: 100vh;
      padding: 12px;
    }
    #iceberg-templates-root {
      max-width: 1240px;
      margin: 0 auto;
    }
    .it-loading-shell {
      max-width: 920px;
      margin: 16px auto;
      border: 1px solid #fde68a;
      background: rgba(255,255,255,0.92);
      border-radius: 18px;
      box-shadow: 0 18px 36px rgba(17, 24, 39, 0.07);
      padding: 18px;
    }
    .it-loading-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin: 0 0 8px;
    }
    .it-loading-text {
      margin: 0;
      color: #4b5563;
      line-height: 1.45;
    }
    .it-loading-meta {
      margin-top: 8px;
      color: #92400e;
      font-weight: 700;
      font-size: 0.86rem;
    }
    .it-error {
      border-color: #fecaca;
      background: #fff1f2;
      color: #991b1b;
    }
  </style>
  <script>
    (function () {
      var root = window;
      var pageBuildMeta = { version: '', buildTime: '', buildIso: '', gitCommit: '' };

      function normalizeToken(v) { return String(v == null ? '' : v).trim(); }
      function currentUrl() { try { return new URL(window.location.href); } catch (e) { return null; } }

      function updateLoading(message, extra, isError) {
        var mount = document.getElementById('iceberg-templates-root');
        if (!mount) return;
        mount.innerHTML = [
          '<div class="it-loading-shell' + (isError ? ' it-error' : '') + '">',
          '<p class="it-loading-title">' + (isError ? 'שגיאה בטעינת קצה קרחון' : 'טוען קצה קרחון...') + '</p>',
          '<p class="it-loading-text">' + (message || '') + '</p>',
          extra ? '<div class="it-loading-meta">' + extra + '</div>' : '',
          '</div>'
        ].join('');
      }

      function buildSignedUrl(versionValue, buildTimeValue) {
        var url = currentUrl();
        if (!url) return null;
        var version = normalizeToken(versionValue);
        var buildTime = normalizeToken(buildTimeValue);
        if (version) url.searchParams.set('v', version);
        if (buildTime) url.searchParams.set('t', buildTime);
        return url;
      }

      function maybeRefreshEmbeddedFrameFromManifest(manifest) {
        var isEmbedded = false;
        try { isEmbedded = window.self !== window.top; } catch (e) { isEmbedded = true; }
        if (!isEmbedded) return;
        var url = currentUrl();
        if (!url) return;

        var currentV = normalizeToken(url.searchParams.get('v'));
        var currentT = normalizeToken(url.searchParams.get('t'));
        var latestV = normalizeToken(manifest && manifest.version);
        var latestT = normalizeToken(manifest && manifest.buildTime);
        if (!latestV && !latestT) return;
        if (currentV === latestV && currentT === latestT) return;

        var target = buildSignedUrl(latestV, latestT);
        if (target && target.toString() !== window.location.href) {
          window.location.replace(target.toString());
        }
      }

      function withBuildQuery(path) {
        var raw = String(path || '');
        var version = normalizeToken(pageBuildMeta.version);
        var buildTime = normalizeToken(pageBuildMeta.buildTime);
        try {
          var u = new URL(raw, window.location.href);
          if (version) u.searchParams.set('v', version);
          if (buildTime) u.searchParams.set('t', buildTime);
          return u.toString();
        } catch (e) {
          var sep = raw.indexOf('?') === -1 ? '?' : '&';
          var qs = [];
          if (version) qs.push('v=' + encodeURIComponent(version));
          if (buildTime) qs.push('t=' + encodeURIComponent(buildTime));
          return raw + (qs.length ? sep + qs.join('&') : '');
        }
      }

      function fetchManifest() {
        var nonce = Date.now() + '-' + Math.random().toString(36).slice(2);
        return fetch('version.json?_iceberg=' + encodeURIComponent(nonce), { cache: 'no-store' })
          .then(function (res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
          .then(function (manifest) {
            pageBuildMeta = {
              version: normalizeToken(manifest && manifest.version),
              buildTime: normalizeToken(manifest && manifest.buildTime),
              buildIso: normalizeToken(manifest && manifest.buildIso),
              gitCommit: normalizeToken(manifest && manifest.gitCommit)
            };
            root.__ICEBERG_TEMPLATES_BUILD_META__ = pageBuildMeta;
            root.__ICEBERG_TEMPLATES_ASSET_V__ = [pageBuildMeta.version, pageBuildMeta.buildTime].filter(Boolean).join('-');
            maybeRefreshEmbeddedFrameFromManifest(manifest);
            return manifest;
          })
          .catch(function () { return null; });
      }

      function loadBundle() {
        var extra = [];
        if (pageBuildMeta.version) extra.push('v' + pageBuildMeta.version);
        if (pageBuildMeta.gitCommit) extra.push(pageBuildMeta.gitCommit.slice(0, 7));
        if (pageBuildMeta.buildIso) extra.push(pageBuildMeta.buildIso);

        updateLoading(
          'מכין את מסך קצה הקרחון: גרירת מילה/ביטוי לצורת עומק, מילוי חריצים, שאלה אוטומטית ווריאציות "מטופל אחר".',
          extra.join(' · '),
          false
        );

        var script = document.createElement('script');
        script.src = withBuildQuery('js/iceberg-templates-trainer.bundle.js');
        script.defer = true;
        script.onerror = function () {
          updateLoading('לא ניתן לטעון את iceberg-templates-trainer.bundle.js', 'בדוק build/push', true);
          console.error('[IcebergTemplates] Failed to load bundle');
        };
        document.head.appendChild(script);
      }

      function start() {
        fetchManifest().finally(loadBundle);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start, { once: true });
      } else {
        start();
      }
    })();
  </script>
</head>
<body>
  <div id="iceberg-templates-root">
    <div class="it-loading-shell">
      <p class="it-loading-title">טוען קצה קרחון...</p>
      <p class="it-loading-text">מכין את מנוע השלדים והגרירה.</p>
    </div>
  </div>
</body>
</html>
