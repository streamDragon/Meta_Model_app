<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Scenario Trainer - Meta Model Dialogue Simulator</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/css/feature-welcome.css">
  <script src="js/trainer-platform-contracts.js"></script>
  <script src="js/trainer-standalone.js"></script>
  <script>
    window.MetaTrainerStandalone.boot({
      "trainerId": "scenario-trainer",
      "manifestKey": "_scenario_trainer",
      "css": [
            "css/style.css",
            "css/scenario-trainer.css",
            "css/ui-enhancements.css",
            "css/meta-model-redesign.css"
      ],
      "scripts": [
            "js/scenario-trainer-app.js"
      ]
});
  </script>
  <script>
    (function () {
      var FEATURE_ID = 'fw-scenario';
      var welcomeHTML = '<div class="fw-overlay" id="' + FEATURE_ID + '">' +
        '<span class="fw-badge">סימולציה</span>' +
        '<h1 class="fw-title">סימולטור סצנות</h1>' +
        '<p class="fw-hook">בוחרים תרחיש, רואים שיחה חיה ואמיתית – ומתאמנים שיחה עם הנפש כל שיחה.</p>' +
        '<div class="fw-cards">' +
          '<div class="fw-card">' +
            '<span class="fw-card__kicker">מה עושים</span>' +
            '<h3 class="fw-card__title">שיחה חיה</h3>' +
            '<p class="fw-card__body">מוצגת שיחה בין שני נפשות, ומתאמן להיות תגובה תוך כדי. כך מתוודעים לאנשים.</p>' +
          '</div>' +
          '<div class="fw-card">' +
            '<span class="fw-card__kicker">מה מלמדים</span>' +
            '<h3 class="fw-card__title">לא רק ניתוח חי</h3>' +
            '<p class="fw-card__body">רוצים לא לעצמם עושים תגובות, מסלול, ומחשבים.</p>' +
          '</div>' +
          '<div class="fw-card">' +
            '<span class="fw-card__kicker">מה מתקדמים</span>' +
            '<h3 class="fw-card__title">תרחיש מלא</h3>' +
            '<p class="fw-card__body">כשרוצים לתרגל את רצון שצריך לנפש – לא רק לאחד.</p>' +
          '</div>' +
        '</div>' +
        '<div class="fw-example">' +
          '<span class="fw-example__label">דוגמה קצרה</span>' +
          '<p class="fw-example__sentence">"אתה תמיד מוצא!"</p>' +
          '<p class="fw-example__note">→ מה עם זה? שיקוף? מתכוון? שאלה פתוחה?</p>' +
        '</div>' +
        '<button class="fw-cta" onclick="document.getElementById(\'' + FEATURE_ID + '\').style.display=\'none\';document.getElementById(\'trainerContent\').style.display=\'block\';">' +
          'פתחו את התרגיל ←' +
        '</button>' +
      '</div>';
      function injectWelcome() {
        if (document.getElementById(FEATURE_ID)) return;
        var wrapper = document.createElement('div');
        wrapper.id = 'trainerContent';
        wrapper.style.display = 'none';
        while (document.body.firstChild) {
          wrapper.appendChild(document.body.firstChild);
        }
        document.body.insertAdjacentHTML('afterbegin', welcomeHTML);
        document.body.appendChild(wrapper);
      }
      var obs = new MutationObserver(function (mutations) {
        for (var i = 0; i < mutations.length; i++) {
          if (mutations[i].addedNodes.length) {
            injectWelcome();
            break;
          }
        }
      });
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          obs.observe(document.body, { childList: true });
        });
      } else {
        obs.observe(document.body, { childList: true });
      }
    })();
  </script>
</head>
<body></body>
</html>
